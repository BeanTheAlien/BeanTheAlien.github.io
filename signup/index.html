<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Epic Website</title>
    <link rel="icon" type="image/png" href="../alien.png"/>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width"/>
    <link rel="stylesheet" href="../style.css">
  </head>
  <body>
    <script src="../pagedefault.js" type="module"></script>
    <h1 class="title" id="title">Sign Up</h1>
    <form id="signup">
      <input type="text" id="username" placeholder="Cool username..." required>
      <div class="space"></div>
      <input type="email" id="email" placeholder="Cool email..." required>
      <div class="space"></div>
      <input type="password" id="password" placeholder="Cool password..." required>
      <div class="space"></div>
      <button id="subm" type="submit">Submit</button>
      <div class="space"></div>
      <input type="checkbox" id="check" name="check">
      <label for="check">I would like to receive promotional and update emails.</label>
    </form>
    <div class="space"></div>
    <a href="/signin"><button>Sign Up</button></a>
    <script src="index.js" type="module"></script>
  </body>
</html>
